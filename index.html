  <body>
    <div id="root"></div>
    <script>
      // Limpeza definitiva de Service Workers e caches antigos.
      // Se detectar SW controlando a aba ou caches existentes, força UMA
      // recarga (com guarda em sessionStorage + query param) para que o
      // navegador comum saia do bundle antigo preso pelo SW antigo.
      (function () {
        try {
          var hasSW = 'serviceWorker' in navigator;
          var hasCaches = !!(window.caches && caches.keys);
          if (!hasSW && !hasCaches) return;

          var url = new URL(window.location.href);
          var alreadyCleaned =
            url.searchParams.has('sw-cleanup') ||
            sessionStorage.getItem('__sw_cleaned__') === '1';

          var unregP = hasSW
            ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
                  return regs.length > 0;
                });
              }).catch(function () { return false; })
            : Promise.resolve(false);

          var cachesP = hasCaches
            ? caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () {
                  return keys.length > 0;
                });
              }).catch(function () { return false; })
            : Promise.resolve(false);

          var hadController = hasSW && !!navigator.serviceWorker.controller;

          Promise.all([unregP, cachesP]).then(function (results) {
            var hadAny = hadController || results[0] || results[1];
            if (!hadAny || alreadyCleaned) return;
            try {
              sessionStorage.setItem('__sw_cleaned__', '1');
              url.searchParams.set('sw-cleanup', Date.now().toString());
              window.location.replace(url.toString());
            } catch (e) {}
          }).catch(function () {});
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
